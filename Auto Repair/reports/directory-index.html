<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Scalefox Directory – Business Landing Pages</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f8fafc;color:#1e293b;min-height:100vh}
.header{background:linear-gradient(135deg,#1e40af,#3b82f6);color:#fff;padding:2.5rem 1.5rem;text-align:center}
.header h1{font-size:1.75rem;font-weight:700;margin-bottom:.5rem}
.header p{font-size:1rem;opacity:.85}
.container{max-width:1100px;margin:0 auto;padding:1.5rem}
.search-box{width:100%;padding:.75rem 1rem;border:2px solid #e2e8f0;border-radius:.5rem;font-size:1rem;margin-bottom:1rem;outline:none;transition:border-color .2s}
.search-box:focus{border-color:#3b82f6}

/* Tabs */
.tabs{display:flex;gap:0;margin-bottom:1.25rem;border-bottom:2px solid #e2e8f0}
.tab{padding:.65rem 1.5rem;font-size:.9rem;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:#64748b;transition:all .2s;user-select:none}
.tab:hover{color:#3b82f6}
.tab.active{color:#3b82f6;border-bottom-color:#3b82f6}
.tab .count{font-size:.75rem;font-weight:500;background:#e2e8f0;color:#64748b;padding:.1rem .45rem;border-radius:1rem;margin-left:.35rem}
.tab.active .count{background:#dbeafe;color:#3b82f6}

/* Filters */
.filters{display:flex;flex-wrap:wrap;gap:1rem;margin-bottom:1.25rem;align-items:flex-start}
.filter-group{display:flex;flex-direction:column;gap:.4rem}
.filter-label{font-size:.75rem;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.04em}
.filter-pills{display:flex;flex-wrap:wrap;gap:.4rem}
.pill{padding:.35rem .75rem;border:1.5px solid #e2e8f0;border-radius:2rem;font-size:.8rem;font-weight:500;cursor:pointer;background:#fff;color:#475569;transition:all .15s;user-select:none}
.pill:hover{border-color:#93c5fd;background:#eff6ff}
.pill.active{background:#3b82f6;color:#fff;border-color:#3b82f6}

.stats{font-size:.875rem;color:#64748b;margin-bottom:1rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1rem}

/* Card */
.card{background:#fff;border:1px solid #e2e8f0;border-radius:.75rem;padding:1.25rem;color:inherit;transition:box-shadow .2s,border-color .2s;display:flex;flex-direction:column;gap:.5rem}
.card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08);border-color:#3b82f6}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem}
.card-name{font-weight:600;font-size:.95rem;color:#1e293b;flex:1}
.card-meta{display:flex;justify-content:space-between;align-items:center;gap:.5rem}
.card-location{font-size:.8rem;color:#64748b}
.card-badges{display:flex;gap:.35rem;align-items:center}
.card-lang{font-size:.65rem;font-weight:600;padding:.15rem .4rem;border-radius:.25rem;text-transform:uppercase}
.card-lang.he{background:#fef3c7;color:#92400e}
.card-lang.en{background:#dbeafe;color:#1e40af}
.card-rating{font-size:.75rem;font-weight:600;color:#f59e0b;display:flex;align-items:center;gap:.2rem}

/* Contact info */
.card-contact{display:flex;flex-wrap:wrap;gap:.5rem .75rem;font-size:.78rem;color:#475569}
.card-contact a{color:#3b82f6;text-decoration:none}
.card-contact a:hover{text-decoration:underline}
.contact-item{display:flex;align-items:center;gap:.25rem}
.contact-icon{width:14px;height:14px;opacity:.6;flex-shrink:0}

/* Status dropdown */
.status-select{font-size:.72rem;font-weight:600;padding:.25rem .5rem;border-radius:.35rem;border:1.5px solid #e2e8f0;background:#fff;cursor:pointer;outline:none;color:#475569;transition:border-color .2s}
.status-select:focus{border-color:#3b82f6}
.status-select.s-cold{border-color:#94a3b8;color:#64748b}
.status-select.s-reached1{border-color:#f59e0b;color:#b45309}
.status-select.s-reached2{border-color:#f97316;color:#c2410c}
.status-select.s-reached3{border-color:#ef4444;color:#dc2626}
.status-select.s-responded{border-color:#22c55e;color:#16a34a}
.status-select.s-meeting{border-color:#8b5cf6;color:#7c3aed}
.status-select.s-closed{border-color:#3b82f6;color:#2563eb;background:#eff6ff}
.status-select.s-not-interested{border-color:#e2e8f0;color:#94a3b8}

/* Links row */
.card-links{display:flex;gap:.5rem;margin-top:.25rem;flex-wrap:wrap;align-items:center}
.card-link{font-size:.75rem;font-weight:600;display:inline-flex;align-items:center;gap:.35rem;padding:.45rem 1rem;border-radius:.375rem;transition:all .2s;text-decoration:none;border:none;cursor:pointer}
.card-link.website{background:#3b82f6;color:#fff}
.card-link.website:hover{background:#2563eb;transform:translateY(-1px);box-shadow:0 2px 8px rgba(59,130,246,.35)}
.card-link.proposal{background:#7c3aed;color:#fff}
.card-link.proposal:hover{background:#6d28d9;transform:translateY(-1px);box-shadow:0 2px 8px rgba(124,58,237,.35)}

/* Expand toggle */
.expand-btn{font-size:.72rem;font-weight:500;color:#64748b;cursor:pointer;background:none;border:none;padding:.25rem .5rem;border-radius:.25rem;transition:all .15s;margin-left:auto}
.expand-btn:hover{background:#f1f5f9;color:#3b82f6}

/* Expanded section */
.card-expanded{display:none;border-top:1px solid #f1f5f9;padding-top:.75rem;margin-top:.25rem}
.card-expanded.open{display:block}
.social-links{display:flex;flex-wrap:wrap;gap:.5rem}
.social-link{font-size:.75rem;font-weight:500;color:#fff;padding:.35rem .75rem;border-radius:.35rem;text-decoration:none;display:inline-flex;align-items:center;gap:.3rem;transition:opacity .15s}
.social-link:hover{opacity:.85}
.social-link.fb{background:#1877f2}
.social-link.ig{background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)}
.social-link.gm{background:#34a853}
.social-link.email{background:#475569}
.expanded-details{margin-top:.5rem;font-size:.78rem;color:#64748b}
.expanded-details span{display:block;margin-bottom:.2rem}

.no-results{text-align:center;padding:3rem;color:#94a3b8;font-size:1.1rem;display:none}
@media(max-width:600px){
  .tabs{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .grid{grid-template-columns:1fr}
  .filters{gap:.5rem}
}
</style>
</head>

</div>

  if (AREA_MAP[loc]) return AREA_MAP[loc];

  return 'other';
}

function loadStatuses() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { return {}; }
}
function saveStatus(slug, status) {
  const s = loadStatuses();
  s[slug] = status;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
}
function getStatus(slug) {
  return loadStatuses()[slug] || 'cold';

const grid = document.getElementById('grid');
const stats = document.getElementById('stats');
const noResults = document.getElementById('noResults');
const search = document.getElementById('search');

let activeVertical = 'all';
let activeType = 'all';
let activeLang = 'all';
let activeArea = 'all';
let activeStatus = 'all';

// Tab click
document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  activeVertical = tab.dataset.vertical;
  render();
});

// Generic filter handler
function setupFilter(id, setter) {
  document.getElementById(id).addEventListener('click', e => {
    const pill = e.target.closest('.pill');
    if (!pill) return;
    document.querySelectorAll('#' + id + ' .pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    setter(pill);
    render();
  });
}
setupFilter('typeFilter', p => activeType = p.dataset.type);
setupFilter('langFilter', p => activeLang = p.dataset.lang);
setupFilter('areaFilter', p => activeArea = p.dataset.area);
setupFilter('statusFilter', p => activeStatus = p.dataset.status);

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function getWebsiteUrl(item) {
  if (item.v === 'dentists') return '/' + item.f + '/';
  return '/auto-repair/' + item.f + '/';
}

function getProposalUrl(item) {
  if (item.v === 'dentists') return '/' + item.f + '/proposal.html';
  return '/auto-repair/' + item.f + '/proposal.html';
}

function render() {
  const q = (search.value || '').toLowerCase();

  let filtered = items.filter(item => {
    if (q && !item.n.toLowerCase().includes(q) && !item.l.toLowerCase().includes(q) && !item.f.toLowerCase().includes(q) && !(item.e||'').toLowerCase().includes(q)) return false;
    if (activeVertical !== 'all' && item.v !== activeVertical) return false;
    if (activeLang !== 'all' && item.lang !== activeLang) return false;
    if (activeArea !== 'all' && getArea(item.l) !== activeArea) return false;
    if (activeStatus !== 'all' && getStatus(item.f) !== activeStatus) return false;
    return true;
  });

  const unique = {};
  filtered.forEach(item => { if (!unique[item.f]) unique[item.f] = item; });
  const cards = Object.values(unique);

  // Update counts
  const allUniq = {};
  items.forEach(i => { allUniq[i.f] = i; });
  const dentistCount = Object.values(allUniq).filter(i => i.v === 'dentists').length;
  const autoCount = Object.values(allUniq).filter(i => i.v === 'auto-repair').length;
  document.getElementById('countAll').textContent = dentistCount + autoCount;
  document.getElementById('countDentists').textContent = dentistCount;
  document.getElementById('countAuto').textContent = autoCount;

  stats.textContent = 'Showing ' + cards.length + ' businesses';
  if (cards.length === 0) {
    grid.innerHTML = '';
    noResults.style.display = 'block';
    return;
  }
  noResults.style.display = 'none';

  grid.innerHTML = cards.map(c => {
    const ratingHtml = c.r ? '<span class="card-rating">★ ' + c.r + (c.rc ? ' (' + c.rc + ')' : '') + '</span>' : '';
    const curStatus = getStatus(c.f);

    // Status dropdown
    const statusOpts = STATUS_OPTIONS.map(o =>
      '<option value="' + o.v + '"' + (curStatus === o.v ? ' selected' : '') + '>' + o.l + '</option>'
    ).join('');
    const statusHtml = '<select class="status-select s-' + curStatus + '" data-slug="' + c.f + '" onchange="handleStatus(this)">' + statusOpts + '</select>';

    // Contact info
    let contactHtml = '';
    if (c.ph) contactHtml += '<span class="contact-item"><svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg><a href="tel:' + esc(c.ph) + '">' + esc(c.ph) + '</a></span>';
    if (c.e) contactHtml += '<span class="contact-item"><svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 6L2 7"/></svg><a href="mailto:' + esc(c.e) + '">' + esc(c.e) + '</a></span>';

    // Links
    let linksHtml = '';
    if (activeType === 'all' || activeType === 'website') {
      linksHtml += '<a class="card-link website" href="' + getWebsiteUrl(c) + '" target="_blank">Website</a>';
    }
    if ((activeType === 'all' || activeType === 'proposal') && c.has_p) {
      linksHtml += '<a class="card-link proposal" href="' + getProposalUrl(c) + '" target="_blank">Proposal</a>';
    }

    // Social links for expanded section
    let socialHtml = '';
    if (c.fb) socialHtml += '<a class="social-link fb" href="' + esc(c.fb) + '" target="_blank"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/></svg>Facebook</a>';
    if (c.ig) socialHtml += '<a class="social-link ig" href="' + esc(c.ig) + '" target="_blank"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/></svg>Instagram</a>';
    if (c.gm) socialHtml += '<a class="social-link gm" href="' + esc(c.gm) + '" target="_blank"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 010-5 2.5 2.5 0 010 5z"/></svg>Google Maps</a>';
    if (c.e) socialHtml += '<a class="social-link email" href="mailto:' + esc(c.e) + '" target="_blank"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 6L2 7"/></svg>Email</a>';

    const hasExpanded = socialHtml || c.ph;
    const expandBtn = hasExpanded ? '<button class="expand-btn" onclick="toggleExpand(this)" data-slug="' + c.f + '">More ▾</button>' : '';

    let expandedHtml = '';
    if (hasExpanded) {
      expandedHtml = '<div class="card-expanded" id="exp-' + c.f + '">';
      if (socialHtml) expandedHtml += '<div class="social-links">' + socialHtml + '</div>';
      expandedHtml += '</div>';
    }

    return '<div class="card">' +
      '<div class="card-header">' +
        '<span class="card-name">' + esc(c.n) + '</span>' +
        statusHtml +
      '</div>' +
      '<span class="card-meta">' +
        '<span class="card-location">' + esc(c.l) + '</span>' +
        '<span class="card-badges">' +
          ratingHtml +
          '<span class="card-lang ' + c.lang + '">' + (c.lang === 'he' ? 'HE' : 'EN') + '</span>' +
        '</span>' +
      '</span>' +
      (contactHtml ? '<div class="card-contact">' + contactHtml + '</div>' : '') +
      '<div class="card-links">' + linksHtml + expandBtn + '</div>' +
      expandedHtml +
    '</div>';
  }).join('');
}

function handleStatus(select) {
  const slug = select.dataset.slug;
  const val = select.value;
  saveStatus(slug, val);
  // Update class for color
  select.className = 'status-select s-' + val;
}

function toggleExpand(btn) {
  const slug = btn.dataset.slug;
  const el = document.getElementById('exp-' + slug);
  if (!el) return;
  el.classList.toggle('open');
  btn.textContent = el.classList.contains('open') ? 'Less ▴' : 'More ▾';
}

search.addEventListener('input', () => render());
render();
</script>
</body>
</html>
